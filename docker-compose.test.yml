services:
  raptor:
    build:
      context: ./services/raptor
      dockerfile: Dockerfile
    container_name: bouclier-raptor
    restart: always
    privileged: true
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    environment:
      - PYTHONUNBUFFERED=1
      - ANTHROPIC_API_KEY=test
      - OPENAI_API_KEY=test
    volumes:
      - ./raptor-data:/app/out:rw
      - ./raptor-logs:/app/logs:rw
    networks:
      - core-net
      - ai-net
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: test-ollama
    networks:
      - ai-net

networks:
  core-net:
    driver: bridge
  ai-net:
    driver: bridge
