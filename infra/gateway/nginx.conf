worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────
    log_format shield '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time uct=$upstream_connect_time '
                      'uht=$upstream_header_time urt=$upstream_response_time '
                      'org=$http_x_organization_id rid=$http_x_request_id';

    access_log /var/log/nginx/access.log shield;
    error_log  /var/log/nginx/error.log warn;

    # ── Basic Tuning ───────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    client_max_body_size 50M;
    server_tokens   off;

    # ── Rate Limiting Zones ────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=heavy:10m rate=2r/s;
    limit_req_zone $http_x_organization_id zone=per_org:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ── Docker DNS resolver for dynamic upstream resolution ─────
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── HTTPS Server ───────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name bouclier.local;

        ssl_certificate     /etc/nginx/certs/bouclier.crt;
        ssl_certificate_key /etc/nginx/certs/bouclier.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        include /etc/nginx/common/*.conf;
    }

    # ── HTTP Server (redirects to HTTPS in production) ────────
    server {
        listen 80 default_server;
        server_name _;

        # Production: uncomment to redirect all HTTP to HTTPS
        # return 301 https://$host$request_uri;

        include /etc/nginx/common/*.conf;
    }
}
