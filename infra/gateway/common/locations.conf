# ── Upstream variables (dynamic DNS resolution) ─────────────
set $backend "http://backend:8005";
set $frontend "http://frontend:3000";
set $tools "http://tools-api:8100";
set $redhound "http://redhound:5000";

# ── Honeypot / Anti-Bot ──────────────────────────────────────
location ~* /(wp-admin|admin\.php|phpmyadmin|\.env|config\.php|xmlrpc\.php) {
    access_log /var/log/nginx/honeypot.log;
    return 403 "Blocked by Bouclier Shield";
}

# ── Health Check ─────────────────────────────────────────────
location = /health {
    access_log off;
    return 200 '{"status":"shield_active"}';
    add_header Content-Type application/json;
}

# ── RedHound Pro (Active Defense & Exploit Intel) ────────────
location /redhound/ {
    proxy_pass $redhound;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Organization-ID $http_x_organization_id;
    proxy_set_header X-Request-ID $http_x_request_id;
}

# ── Tools API ────────────────────────────────────────────────
location /tools/ {
    proxy_pass $tools;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── Agent WebSockets ─────────────────────────────────────────
location /agent/ {
    proxy_pass $tools;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# ── Auth Routes (handled by NextAuth on frontend) ────────────
location /api/auth/ {
    proxy_pass $frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── WebSocket (Offensive Consultant + Mythos Real-time) ──────
location ~ ^/api/(offensive/ws|mythos/ws) {
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}

# ── SSE / Event Streams (no buffering) ───────────────────────
location ~ ^/api/(datasets/stream|threat-map/stream|telemetry/live) {
    limit_req zone=global burst=5 nodelay;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Organization-ID $http_x_organization_id;
    proxy_set_header X-Request-ID $http_x_request_id;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;
    proxy_read_timeout 86400s;
}

# ── API (all other routes) ───────────────────────────────────
location /api/ {
    limit_req zone=global burst=20 nodelay;
    limit_req zone=per_org burst=15 nodelay;
    limit_conn conn_per_ip 10;

    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Organization-ID $http_x_organization_id;
    proxy_set_header X-Request-ID $http_x_request_id;

    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;
}

# ── Frontend (catch-all) ─────────────────────────────────────
location / {
    proxy_pass $frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_intercept_errors on;

    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;
}
