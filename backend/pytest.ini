[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -m "not integration and not slow"
markers =
    integration: marks tests as integration tests (require running services)
    slow: marks tests as slow (opt-in)
filterwarnings =
    ignore::DeprecationWarning