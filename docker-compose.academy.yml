services:
  # --- Academy Lab Services (Isolated) ---

  # 1. OWASP Juice Shop (Web Vulnerabilities)
  lab-juice-shop:
    image: bkimminich/juice-shop
    container_name: academy-juice
    networks:
      - academy-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # 2. crAPI (API Security Top 10)
  # Simplified single container for dev/demo - in prod use full microservices stack
  # Using a mock placeholder since full crAPI is huge (docker-compose overrides usually)
  # For this demo we use a vulnerable app "vampi"
  lab-vampi:
    image: erev0s/vampi
    container_name: academy-vampi
    networks:
      - academy-net
    environment:
      - DANGEROUS_BOOL=true
    restart: unless-stopped

  # 3. Log Generator (Auth/Forensics logs)
  lab-logs-gen:
    image: mingrammer/flog
    container_name: academy-logs
    command: -f apache_combined -n 1000 -d 1s -l
    networks:
      - academy-net

  # 4. Atomic Red Team Runner (Simulation)
  # Lightweight container to run atomic tests
  lab-atomic:
    image: alpine:latest
    container_name: academy-atomic
    command: sh -c "apk add --no-cache curl bash && while true; do sleep 3600; done"
    networks:
      - academy-net

networks:
  academy-net:
    driver: bridge
    internal: true # No internet access for labs
