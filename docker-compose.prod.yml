# ╔══════════════════════════════════════════════════════════════════╗
# ║   BOUCLIER SOC — PRODUCTION DOCKER COMPOSE                      ║
# ║   Services: Frontend | Backend | Tools-API | RedHound | DB | Redis║
# ╚══════════════════════════════════════════════════════════════════╝
version: '3.8'

services:

  # ── CORE DATABASE (PostgreSQL) ─────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: bouclier-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bouclier_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env before production deploy}
      POSTGRES_DB: ${DB_NAME:-bouclier_data}
    volumes:
      - bouclier_postgres_data:/var/lib/postgresql/data
    networks:
      - bouclier-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bouclier_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── CACHE / MESSAGE BROKER (Redis) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bouclier-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - bouclier_redis_data:/data
    networks:
      - bouclier-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── AI BACKEND (FastAPI + Scikit-learn + GRU Model) ──────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bouclier-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8005}:8005"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-bouclier_user}:${DB_PASSWORD:?Set DB_PASSWORD in .env before production deploy}@db:5432/${DB_NAME:-bouclier_data}
      - DB_HOST=db
      - DB_USER=${DB_USER:-bouclier_user}
      - DB_PASSWORD=${DB_PASSWORD:?Set DB_PASSWORD in .env before production deploy}
      - DB_NAME=${DB_NAME:-bouclier_data}
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3001}
      - DEFAULT_ADMIN_USERNAME=${ADMIN_USER:-admin}
      - DEFAULT_ADMIN_PASSWORD=${ADMIN_PASS:?Set ADMIN_PASS in .env before production deploy}
      - DEFAULT_ADMIN_EMAIL=${ADMIN_EMAIL:-admin@bouclier.local}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434}
      - LLM_MODEL=${LLM_MODEL:-llama3.2:3b}
      - PYTHONUNBUFFERED=1
    volumes:
      - bouclier_logs:/app/logs
      - bouclier_ai_models:/app/app/ml/models
      - ./mythos-launch-response-master:/mythos-launch-response-master
    networks:
      - bouclier-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── OFFENSIVE TOOLS ENGINE (Kali Linux Base) ─────────────────
  tools-api:
    build:
      context: ./
      dockerfile: tools-api/Dockerfile
    container_name: bouclier-tools-api
    restart: unless-stopped
    ports:
      - "${TOOLS_PORT:-8100}:8100"
    environment:
      - TOOLS_API_KEY=${TOOLS_API_KEY:?Set TOOLS_API_KEY in .env before production deploy}
      - TOOLS_CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3001,http://localhost:3002}
      - ALLOW_PUBLIC_TARGETS=${ALLOW_PUBLIC_TARGETS:-1}
      - SAFE_MODE=${SAFE_MODE:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - bouclier-net
    volumes:
      - ./mythos-launch-response-master:/opt/mythos-launch-response-master
      - ./tools-api/mythos_scripts:/opt/tools-api/mythos_scripts
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # ── REDHOUND PRO (Active Defense & Exploit Intelligence) ──────
  redhound:
    build:
      context: ./services/redhound-pro
      dockerfile: Dockerfile
    container_name: bouclier-redhound
    restart: unless-stopped
    ports:
      - "${REDHOUND_PORT:-5000}:5000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - bouclier-net

  # ── VECTOR MEMORY (Qdrant) ────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: bouclier-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - bouclier_qdrant_data:/qdrant/storage
    networks:
      - bouclier-net

  # ── FRONTEND (Next.js Production Build) ───────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${PUBLIC_URL:-http://localhost:8005}
        - NEXT_PUBLIC_TOOLS_API_BASE=${PUBLIC_TOOLS_URL:-http://localhost:8100}
        - NEXT_PUBLIC_REDHOUND_API=${PUBLIC_REDHOUND_URL:-http://localhost:5000}
        - NEXT_PUBLIC_PENTESTER_API_URL=${PUBLIC_PENTESTER_URL:-http://localhost:9100}
    container_name: bouclier-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - bouclier-net
    depends_on:
      - backend
      - tools-api

# ── VOLUMES (Persistent Data) ─────────────────────────────────
volumes:
  bouclier_postgres_data:
    driver: local
  bouclier_redis_data:
    driver: local
  bouclier_qdrant_data:
    driver: local
  bouclier_logs:
    driver: local
  bouclier_ai_models:
    driver: local

# ── NETWORK ───────────────────────────────────────────────────
networks:
  bouclier-net:
    driver: bridge
