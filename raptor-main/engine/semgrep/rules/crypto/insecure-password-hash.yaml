rules:
  # V11.4.2: Passwords must be stored using a computationally intensive KDF
  # (bcrypt, argon2, scrypt, PBKDF2). General-purpose hash functions are not
  # suitable for password storage even with a salt.
  # Note: these rules use variable-name heuristics and will have false positives.

  - id: raptor.crypto.password.weak-hash.python
    message: >
      Hashing a password with a general-purpose hash function is insecure even
      with a salt. Use bcrypt, argon2-cffi, or hashlib.scrypt / pbkdf2_hmac instead.
    languages: [python]
    severity: HIGH
    patterns:
      - pattern: hashlib.$ALGO($VAR, ...)
      - metavariable-regex:
          metavariable: $ALGO
          regex: "^(md5|sha1|sha224|sha256|sha384|sha512|blake2b|blake2s)$"
      - metavariable-regex:
          metavariable: $VAR
          regex: "(?i).*(password|passwd|pwd|passphrase|secret|credential).*"
    metadata:
      cwe: ["CWE-916"]
      asvs: ["V11.4.2"]

  - id: raptor.crypto.password.weak-hash.java
    message: >
      Hashing a password with MessageDigest is insecure. Use BCrypt, SCrypt,
      or Argon2 via a library such as Spring Security or Bouncy Castle.
    languages: [java, kotlin]
    severity: HIGH
    patterns:
      - pattern: MessageDigest.getInstance($ALG).digest($VAR.getBytes(...))
      - metavariable-regex:
          metavariable: $VAR
          regex: "(?i).*(password|passwd|pwd|passphrase|secret|credential).*"
    metadata:
      cwe: ["CWE-916"]
      asvs: ["V11.4.2"]

  - id: raptor.crypto.password.weak-hash.js
    message: >
      Hashing a password with a general-purpose hash is insecure. Use bcrypt,
      argon2, or scrypt instead.
    languages: [javascript, typescript]
    severity: HIGH
    patterns:
      - pattern: crypto.createHash($ALGO).update($VAR)
      - metavariable-regex:
          metavariable: $VAR
          regex: "(?i).*(password|passwd|pwd|passphrase|secret|credential).*"
    metadata:
      cwe: ["CWE-916"]
      asvs: ["V11.4.2"]

  - id: raptor.crypto.password.weak-hash.php
    message: >
      md5() and sha1() must not be used for password storage. Use password_hash()
      with PASSWORD_BCRYPT or PASSWORD_ARGON2ID instead.
    languages: [php]
    severity: HIGH
    pattern-either:
      - patterns:
          - pattern: md5($VAR)
          - metavariable-regex:
              metavariable: $VAR
              regex: "(?i).*(password|passwd|pwd|passphrase|secret|credential).*"
      - patterns:
          - pattern: sha1($VAR)
          - metavariable-regex:
              metavariable: $VAR
              regex: "(?i).*(password|passwd|pwd|passphrase|secret|credential).*"
    metadata:
      cwe: ["CWE-916"]
      asvs: ["V11.4.2"]
