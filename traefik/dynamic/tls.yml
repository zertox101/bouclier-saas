# Traefik Dynamic TLS Configuration

tls:
  certificates:
    # Local development certificates
    - certFile: /etc/traefik/certs/blueteam.local.crt
      keyFile: /etc/traefik/certs/blueteam.local.key
      stores:
        - default
    
    - certFile: /etc/traefik/certs/bouclier.local.crt
      keyFile: /etc/traefik/certs/bouclier.local.key
      stores:
        - default
    
    - certFile: /etc/traefik/certs/traefik.local.crt
      keyFile: /etc/traefik/certs/traefik.local.key
      stores:
        - default
    
    - certFile: /etc/traefik/certs/prometheus.local.crt
      keyFile: /etc/traefik/certs/prometheus.local.key
      stores:
        - default
    
    - certFile: /etc/traefik/certs/grafana.local.crt
      keyFile: /etc/traefik/certs/grafana.local.key
      stores:
        - default

  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/blueteam.local.crt
        keyFile: /etc/traefik/certs/blueteam.local.key

  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
        - TLS_AES_128_GCM_SHA256
        - TLS_AES_256_GCM_SHA384
        - TLS_CHACHA20_POLY1305_SHA256
      curvePreferences:
        - CurveP521
        - CurveP384
      sniStrict: true
